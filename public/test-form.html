<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senior React Developer - Tech Corp</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }
    
    .header h2 {
      font-size: 24px;
      font-weight: 400;
      opacity: 0.9;
    }
    
    .header p {
      margin-top: 15px;
      opacity: 0.8;
      font-size: 14px;
    }
    
    .form-container {
      padding: 40px;
    }
    
    .form-group {
      margin-bottom: 25px;
    }
    
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
      font-size: 14px;
    }
    
    label .required {
      color: #e74c3c;
    }
    
    input, textarea, select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s;
    }
    
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    textarea {
      resize: vertical;
      min-height: 120px;
    }
    
    input[type="file"] {
      padding: 10px;
      cursor: pointer;
    }
    
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px 32px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }
    
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
    }
    
    .btn-submit:active {
      transform: translateY(0);
    }
    
    .success-message {
      text-align: center;
      padding: 60px 40px;
    }
    
    .success-icon {
      width: 80px;
      height: 80px;
      background: #2ecc71;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      animation: scaleIn 0.5s ease-out;
    }
    
    .success-icon::before {
      content: "✓";
      font-size: 48px;
      color: white;
      font-weight: bold;
    }
    
    @keyframes scaleIn {
      from {
        transform: scale(0);
      }
      to {
        transform: scale(1);
      }
    }
    
    .success-message h1 {
      color: #2ecc71;
      font-size: 32px;
      margin-bottom: 15px;
    }
    
    .confirmation-number {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 8px;
      margin: 25px 0;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: bold;
      color: #667eea;
    }
    
    .info-box {
      background: #e8f4f8;
      border-left: 4px solid #3498db;
      padding: 15px;
      margin-bottom: 25px;
      border-radius: 4px;
      font-size: 14px;
      color: #2c3e50;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Senior React Developer</h1>
      <h2>Tech Corp</h2>
      <p>📍 San Francisco, CA | 💰 $150k - $200k | ⏰ Full-time</p>
    </div>
    
    <div class="form-container">
      <div class="info-box">
        <strong>🤖 AI Agent Test Form</strong><br>
        This is a safe test form for demonstrating CareerPilot AutoAgent. No real application will be submitted.
      </div>
      
      <form id="applicationForm">
        <div class="form-group">
          <label>
            First Name <span class="required">*</span>
          </label>
          <input 
            type="text" 
            name="firstName" 
            id="firstName"
            required 
            placeholder="Enter your first name"
            aria-label="First Name"
          >
        </div>
        
        <div class="form-group">
          <label>
            Last Name <span class="required">*</span>
          </label>
          <input 
            type="text" 
            name="lastName" 
            id="lastName"
            required 
            placeholder="Enter your last name"
            aria-label="Last Name"
          >
        </div>
        
        <div class="form-group">
          <label>
            Email Address <span class="required">*</span>
          </label>
          <input 
            type="email" 
            name="email" 
            id="email"
            required 
            placeholder="your.email@example.com"
            aria-label="Email Address"
          >
        </div>
        
        <div class="form-group">
          <label>
            Phone Number <span class="required">*</span>
          </label>
          <input 
            type="tel" 
            name="phone" 
            id="phone"
            required 
            placeholder="(555) 123-4567"
            aria-label="Phone Number"
          >
        </div>
        
        <div class="form-group">
          <label>
            LinkedIn Profile URL
          </label>
          <input 
            type="url" 
            name="linkedin" 
            id="linkedin"
            placeholder="https://linkedin.com/in/yourprofile"
            aria-label="LinkedIn Profile URL"
          >
        </div>
        
        <div class="form-group">
          <label>
            Portfolio Website
          </label>
          <input 
            type="url" 
            name="portfolio" 
            id="portfolio"
            placeholder="https://yourportfolio.com"
            aria-label="Portfolio Website"
          >
        </div>
        
        <div class="form-group">
          <label>
            Resume/CV <span class="required">*</span>
          </label>
          <input 
            type="file" 
            name="resume" 
            id="resume"
            required 
            accept=".pdf,.doc,.docx"
            aria-label="Resume Upload"
          >
        </div>
        
        <div class="form-group">
          <label>
            Why do you want to work at Tech Corp? <span class="required">*</span>
          </label>
          <textarea 
            name="why" 
            id="why"
            required 
            rows="4" 
            placeholder="Tell us what excites you about this opportunity..."
            aria-label="Why do you want to work here"
          ></textarea>
        </div>
        
        <div class="form-group">
          <label>
            Years of Experience <span class="required">*</span>
          </label>
          <select name="experience" id="experience" required aria-label="Years of Experience">
            <option value="">Select your experience level...</option>
            <option value="0-2">0-2 years</option>
            <option value="3-5">3-5 years</option>
            <option value="6-10">6-10 years</option>
            <option value="10+">10+ years</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>
            How did you hear about us?
          </label>
          <select name="source" id="source" aria-label="How did you hear about us">
            <option value="">Select...</option>
            <option value="linkedin">LinkedIn</option>
            <option value="indeed">Indeed</option>
            <option value="referral">Employee Referral</option>
            <option value="website">Company Website</option>
            <option value="other">Other</option>
          </select>
        </div>
        
        <button type="submit" class="btn-submit" id="submitBtn">
          Submit Application
        </button>
      </form>
    </div>
  </div>
  
  <script>
    document.getElementById('applicationForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      // Simulate processing
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.textContent = 'Submitting...';
      submitBtn.disabled = true;
      
      setTimeout(() => {
        // Generate confirmation number
        const confirmationNumber = 'TC-' + Date.now().toString().slice(-8);
        
        // Show success message
        document.querySelector('.container').innerHTML = `
          <div class="header">
            <h1>Application Submitted!</h1>
            <h2>Tech Corp</h2>
          </div>
          <div class="success-message">
            <div class="success-icon"></div>
            <h1>Thank You for Applying!</h1>
            <p style="font-size: 18px; color: #666; margin-bottom: 20px;">
              We've received your application and will review it shortly.
            </p>
            <div class="confirmation-number">
              Confirmation Number: ${confirmationNumber}
            </div>
            <p style="color: #666; line-height: 1.6;">
              You should receive a confirmation email at <strong>${document.getElementById('email').value}</strong> within the next few minutes.
              <br><br>
              Our team typically reviews applications within 3-5 business days. 
              We'll reach out if your qualifications match our requirements.
            </p>
            <div style="margin-top: 40px; padding-top: 30px; border-top: 1px solid #e0e0e0;">
              <p style="font-size: 14px; color: #999;">
                🤖 This was a test submission for CareerPilot AutoAgent demo
              </p>
            </div>
          </div>
        `;
      }, 1500);
    });
    
    // Add some visual feedback for form filling
    const inputs = document.querySelectorAll('input, textarea, select');
    inputs.forEach(input => {
      input.addEventListener('input', function() {
        if (this.value) {
          this.style.borderColor = '#2ecc71';
        } else {
          this.style.borderColor = '#e0e0e0';
        }
      });
    });
  </script>
</body>
</html>
